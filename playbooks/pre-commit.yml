---
# name: ansible-roles
# file: playbooks/pre-commit.yml

- name: "PLAYBOOK | Render pre-commit config"
  hosts: "{{ target | default('all') }}"
  gather_facts: false
  tasks:
    - name: "Render .pre-commit-config.yaml"
      ansible.builtin.template:
        src: ".pre-commit-config.yaml.j2"
        dest: "{{ ansible_host }}/.pre-commit-config.yaml"
        mode: "0644"
