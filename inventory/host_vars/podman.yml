---
# role: jomrr.podman
# file: inventory/host_vars/podman.yml

# default meta data
meta_year_created: "2019"

# default readme settings
read_description: |-
  This Ansible role installs and configures podman on supported platforms.

  As podman now creates a working default configuration,
  the variable podman_configure was introduced to skip custom configuration.
  In erlier versions podman used journald as events_logger and threw an error
  in rootless mode, which made explicit configuration of file necessary.

# role default variables from meta/argument_specs.yml
read_variables: []

# Example playbooks
read_examples:
  - name: Simple example playbook
    description: |-
      A simple default example playbook for using jomrr.podman.
    code: |-
      ---
      # name: "jomrr.podman"
      # file: "playbook_podman.yml"

      - name: "PLAYBOOK | podman"
        hosts: "podman"
        gather_facts: true
        roles:
          - role: "jomrr.podman"

# references as single line in markdown
read_references:
  - "[libpod Installation Instructions](https://github.com/containers/libpod/blob/master/install.md)"
  - "[podman manpage](https://github.com/containers/libpod/blob/master/docs/podman.1.md)"
  - "[ArchWiki - Linux Containers](https://wiki.archlinux.org/index.php/Linux_Containers)"
  - "[vbatts: centos7 - non-root podman](https://asciinema.org/a/221441)"
  - "[A preview of running containers without root in RHEL 7.6](https://www.redhat.com/en/blog/preview-running-containers-without-root-rhel-76)"
