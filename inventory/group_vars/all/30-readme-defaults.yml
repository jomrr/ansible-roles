---
# name: ansible-roles
# file: inventory/group_vars/all/30-readme-defaults.yml

# Default README variables for generated role repositories.
# Role-specific content belongs into inventory/host_vars/<role>.yml.
readme:
  purpose: ""

  scope:
    managed: []
    not_managed: []

  requirements: []

  managed_files: []

  check_mode:
    summary: ""
    notes: []

  service_behavior:
    summary: ""
    handlers: []

  security: []

  operational_notes: []

  examples:
    - name: Simple example playbook
      description: |-
        Minimal example for applying this role.
      code: |-
        ---
        - name: "Configure {{ role.name }}"
          hosts: "{{ role.name }}"
          gather_facts: true
          roles:
            - role: "{{ role.namespace }}.{{ role.name }}"

  references: []
