---
# name: ansible-roles
# file: inventory/group_vars/all/40-molecule-defaults.yml

# default molecule variables for all roles

molecule:
  defaults:
    dependency:
      name: galaxy
      options:
        requirements-file: meta/requirements.yml
    driver:
      name: podman
    provisioner:
      name: ansible
      config_options:
        defaults:
          forks: 8
          interpreter_python: auto_silent
          callbacks_enabled: "ansible.posix.profile_tasks,ansible.posix.timer"
          callback_result_format: "yaml"
        ssh_connection:
          pipelining: true
      log: true
      playbooks:
        converge: ../resources/playbooks/converge.yml
        verify: ../resources/playbooks/verify.yml
    verifier:
      name: ansible
  enabled: true
  playbooks:
    - name: resources/playbooks/converge.yml
      content: |-
        - name: "{{ role.name | upper }} | Converge"
          hosts: all
          gather_facts: true
          roles:
            - role: "{{ '{{' }} lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') {{ '}}' }}"
    - name: resources/playbooks/verify.yml
      content: |-
        - name: "{{ role.name | upper }} | Verify"
          hosts: all
          gather_facts: false
          tasks:
            - name: "Assert true"
              ansible.builtin.assert:
                that: "true"
                fail_msg: "This should never fail"
  scenarios:
    - scenario:
        name: default
      platforms:
        - name: "{{ role.name }}"
          image: "docker.io/${uns:-{{ role.namespace }}}/molecule-${img:-fedora}:${tag:-latest}"
          pre_build_image: true
          override_command: false
          systemd: true
    - scenario:
        name: dev
